			<h2 id="亚里士多德">亚里士多德</h2>
<p>亚里士多德（Aristotle，公元前384～前322），古希腊先哲，古代著名哲学家、科学家和教育家之一，被誉为希腊哲学的集大成者。他是柏拉图的学生，亚历山大的老师。他的写作涉及伦理学、形而上学、心理学、经济学、神学、政治学、修辞学、自然科学、教育学、诗歌、风俗及雅典法律，构建了西方哲学的第一个广泛系统，包含道德、美学、逻辑、科学、政治和玄学。</p>
