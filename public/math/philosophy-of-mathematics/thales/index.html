			<h2 id="泰勒斯">泰勒斯</h2>
<p>泰勒斯，男，古希腊时期的思想家、科学家、哲学家，出生于爱奥尼亚的米利都城，创建了古希腊最早的哲学学派，是希腊最早的哲学学派——米利都学派（也称爱奥尼亚学派）的创始人。古希腊七贤之一，西方思想史上第一个有记载有名字留下来的思想家，被称为“科学和哲学之祖”。泰勒斯是古希腊及西方第一个自然科学家和哲学家。泰勒斯的学生有阿那克西曼德、阿那克西美尼等。</p>
