			<h2 id="柏拉图的生平">柏拉图的生平</h2>
<p>柏拉图（英语：Plato，古希腊语：Πλατών， 公元前427年（另一说前428年）—公元前347年），原名亚里斯多克勒斯（Aristocles） ，男，出生于雅典，古希腊伟大的哲学家、思想家、教育家、数学家，西方客观唯心主义的创始人，西方文化中最伟大的哲学家和思想家之一。柏拉图和老师苏格拉底，学生亚里士多德并称为希腊三贤，代表作有《普罗塔哥拉》、《美诺》、《尤息德谟斯篇》、《理想国》等</p>
